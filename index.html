    }

      .stats-bar { gap: 0.5rem; padding: 0.6rem 1rem; } .menu-buttons-top { flex-direction: column; }
      .flashcard-front, .flashcard-back { padding: 1.5rem; min-height: 200px; }
      .flashcard-term { font-size: 1.2rem; } .flashcard-def { font-size: 0.95rem; }
    }
  </style>

<script>
(function() {
  const dynamicContent = document.getElementById('dynamicContent');
  
  // ========== 327 ОПРЕДЕЛЕНИЙ ==========
  const ALL_DEFINITIONS = [
    "ARIS (ARchitecture of Integrated Information Systems) — архитектура интегрированных информационных систем",
    "BCP (Business continuity plan) — план обеспечения непрерывности бизнеса",
    "BPMN (Business Process Modeling Notation) — нотация моделирования бизнес-процессов организации",
    "BSC (Balanced Scorecard) — сбалансированная система показателей",
    "CASE (Computer-Aided Software Engineering) — набор инструментов и методов программной инженерии для проектирования программного обеспечения",
    "CASE-средства — инструменты автоматизации процессов проектирования и разработки программного обеспечения",
    "CobiT (Control Objectives for Information and Related Technology) — задачи информационных и смежных технологий",
    "DRP (Disaster recovery plan) — план аварийного восстановления",
    "eEPC (Extended Event-driven Process Chain) — расширенная событийная цепочка процессов",
    "ISACA (Information Systems Audit and Control Association) — международная ассоциация аудита и контроля за информационными системами",
    "IPMA (International Project Management Association) — некоммерческая профессиональная ассоциация по управлению проектами",
    "IT (Information Technology) — информационные технологии",
    "ITIL (IT Infrastructure Library) — библиотека инфраструктуры информационных технологий",
    "ITSM (IT Service Management) — управление IT-услугами",
    "NPV (Net Present Value) — чистая приведенная стоимость проекта",

    "PMBOK (Project Management Body of Knowledge) — свод знаний по управлению проектами",
    "PRINCE2 (PROjects IN Controlled Environments) — методология управления программами/проектами в организации",
    "RAD (Rapid Application Development) — средство быстрой разработки приложений",

    "UP (Unified Process) — унифицированный процесс",
    "RUP (Rational Unified Process) — унифицированный процесс разработки программного обеспечения, созданный компанией Rational Software",
    "SEP (Software Engineering Process) — процесс инжиниринга программного обеспечения",
    "SLA (Service Level Agreement) — соглашение об уровне предоставления услуг",
    "SWEBOK (Software Engineering Body of Knowledge) — свод знаний по программной инженерии (руководство IEEE Computer Society)",
    "TCO (Total Cost of Ownership) — совокупная стоимость владения",
    "Искусственный интеллект (Корнеев Н.В. и др., 2008 г.) — это динамическая система, способная без участия человека: строить полнофункциональные модели, отображающие сложные явления мира вокруг и самого себя в этом мире; анализировать адекватность (соответствие) различных вариантов моделей с целью отбора из них наиболее точных или оптимальных; формировать на основе выбранных моделей вариантные прогнозы ожидаемых последствий",
    "Искусственный интеллект (Национальная стратегия) — комплекс технологических решений, позволяющий имитировать когнитивные функции человека (включая самообучение и поиск решений без заранее заданного алгоритма) и получать при выполнении конкретных задач результаты, сопоставимые, как минимум, с результатами интеллектуальной деятельности человека",
    "Объект управления — это любое явление окружающего мира (или сам субъект), которое рассматривается с точки зрения создания некоторого целенаправленного движения",
    "Комплексная угроза (КУ) — угроза, состоящая из нескольких различных элементарных угроз, связанных между собой посредством определенных синхронизирующих механизмов и не обязательно существующих в одном пространстве",
    "Гибридная угроза — вариация комплексной угрозы, в составе которой обязательно имеются элементарные угрозы, затрагивающие различные пространства функционирования защищаемой системы",
    "Системная угроза ТЭК — это комплексная угроза нефтяной, газовой, угольной и торфяной отрасли, электроэнергетике и теплоснабжению",
    "Цифровая трансформация — подход, при котором компании меняют свои бизнес-модели и экосистемы за счет эффективного использования цифровых компетенций (Источник: IDC)",
    "Жизненный цикл проекта (по Р. Арчибальду) — имеет определенные начальную и конечную точки, привязанные к временной шкале. Проект в своем естественном развитии проходит ряд отдельных фаз",
    "Жизненный цикл разработки ПО (SDLC) — в классическом понимании — последовательность этапов от анализа требований до сопровождения",
    "Модель жизненного цикла (по ГОСТ 12207, 1999) — структура, состоящая из процессов, работ и задач, включающих в себя разработку, эксплуатацию и сопровождение программного продукта, охватывающая жизнь системы от установления требований к ней до прекращения ее использования",
    "Жизненный цикл автоматизированной системы (АС) (по ГОСТ 34, 1990) — совокупность взаимосвязанных процессов создания и последовательного изменения состояния АС, от формирования исходных требований к ней до окончания эксплуатации и утилизации комплекса средств автоматизации АС",
    "Жизненный цикл программной системы (по С. Амблеру) — включает разработку, развертывание, поддержку и сопровождение",
    "Жизненный цикл информационных технологий (ИТ) — включает всю деятельность ИТ-департамента",
    "Жизненный цикл организации/бизнеса — охватывает всю деятельность организации в целом",
    "Каскадная (водопадная) модель — модель, предполагающая строго последовательное (во времени) и однократное выполнение всех фаз проекта с жестким (детальным) предварительным планированием в контексте предопределенных или однажды и целиком определенных требований к программной системе",
    "Итеративная модель — предполагает разбиение жизненного цикла проекта на последовательность итераций, каждая из которых представляет собой «мини-проект», включая все фазы жизненного цикла в применении к созданию меньших фрагментов функциональности",
    "Инкрементальная модель — модель развития продукта, при которой продукт развивается постепенно, с наращиванием функциональности от итерации к итерации",
    "Спиральная модель (модель Бозма) — модель жизненного цикла, отличительной особенностью которой является специальное внимание рискам, влияющим на организацию жизненного цикла",
    "DevOps — методология и культура совместной работы разработчиков (Dev), тестировщиков (QA) и эксплуатационных специалистов (Ops), направленная на ускорение поставки ПО при сохранении качества и надёжности",
    "DevSecOps — расширение методологии DevOps, интегрирующее безопасность на всех этапах жизненного цикла разработки ПО",
    "Проект (по Р. Арчибальду) — это комплекс усилий, предпринимаемых с целью получения конкретных уникальных результатов в рамках отведенного времени и в пределах утвержденного бюджета, который выделяется на оплату ресурсов, используемых или потребляемых в ходе проекта",
    "Микросервисная архитектура (Microservice Architecture, MA) — парадигма архитектуры программного обеспечения, которая направлена на решение ограничений традиционного монолитного программного обеспечения путем разложения всего программного обеспечения на независимо развертываемые и масштабируемые более мелкие части, называемые сервисами или микросервисами",
    "WBS (Work Breakdown Structure) — структура декомпозиции работ (иерархическая структура)",
    "Железный треугольник проекта (PMI PMBOK) — три основных ограничения проекта: содержание, время, стоимость (иногда добавляют четвёртое — качество)",
    "VUCA — акроним, описывающий современную нестабильную среду: Volatility (нестабильность), Uncertainty (неопределённость), Complexity (сложность), Ambiguity (неоднозначность)",
    "Контейнеры — основной строительный элемент паттернов, группа контейнеров, локализованная на одной машине — базовый элемент паттерна. Цель контейнера — установить ограничение на определенный ресурс",
    "Docker — платформа для создания, запуска и развертывания приложений в изолированных средах, называемых контейнерами. Контейнеры обеспечивают согласованную и портативную среду выполнения для приложений, независимо от среды разработки, тестирования или продакшена",
    "Инкапсуляция — скрытие внутренней реализации объекта от внешнего мира",
    "Наследование — родители – дети (дочерние классы)",
    "Полиморфизм — свойство обрабатывать различные типы объектов и классов",

    else if (page === 'gost') renderGostTest();

  // ========== ТЕСТ ПО ГОСТАМ ==========
  function renderGostTest() {
    dynamicContent.innerHTML = `
      <div class="container" id="gostTestContainer">
        ${renderTopButtons('gost')}
        <h1>📘 Тест по ГОСТам</h1>
        <div class="stats-bar" id="gostStatsBar">
          <div class="stat-item stat-correct">✅ Верно: <span id="gostCorrectCount">0</span></div>
          <div class="stat-item stat-incorrect">❌ Неверно: <span id="gostIncorrectCount">0</span></div>
          <div class="stat-item stat-pending">📝 Осталось: <span id="gostPendingCount">0</span></div>
        </div>
        <div class="progress" id="gostProgressIndicator">Вопросов: 0 / 0</div>
        <div id="gostQuestionsContainer"></div>
        <div class="footer">
          <div class="score" id="gostScoreDisplay">✓ 0</div>
          <button class="restart-btn" id="gostRestartButton">⟳ Новый тест</button>
        </div>
      </div>`;
    initGostTest();

  function initGostTest() {
    const rawQuestions = GOST_ENTRIES.map(g => ({
      text: `${g.code} — это:`,
      options: [g.name + ' верно', 
        GOST_ENTRIES[(GOST_ENTRIES.indexOf(g) + 13) % GOST_ENTRIES.length].name,
        GOST_ENTRIES[(GOST_ENTRIES.indexOf(g) + 27) % GOST_ENTRIES.length].name,
        GOST_ENTRIES[(GOST_ENTRIES.indexOf(g) + 41) % GOST_ENTRIES.length].name]
    }));

    function parseQuestions(raw) {
      return raw.map((item, idx) => {
        const correctIndices = [];
        const cleanOptions = item.options.map((opt, optIdx) => {
          const cleaned = opt.replace(/\s*верно\s*$/i, '').trim();
          if (/\s*верно\s*$/i.test(opt)) correctIndices.push(optIdx);
          return cleaned;
        });
        return { id: idx, text: item.text, options: cleanOptions, correct: correctIndices };
      });
    }

    const parsedQuestions = parseQuestions(rawQuestions);
    let currentQuestions = [];
    let userAnswers = new Map();
    let questionLocked = new Map();
    const container = document.getElementById('gostQuestionsContainer');
    const progressEl = document.getElementById('gostProgressIndicator');
    const scoreEl = document.getElementById('gostScoreDisplay');
    const correctEl = document.getElementById('gostCorrectCount');
    const incorrectEl = document.getElementById('gostIncorrectCount');
    const pendingEl = document.getElementById('gostPendingCount');
    const restartBtn = document.getElementById('gostRestartButton');

    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

    function buildQuestions() {
      return shuffle([...parsedQuestions]).map(q => {
        const idxs = q.options.map((_,i)=>i);
        const shuffledIdxs = shuffle([...idxs]);
        const opts = shuffledIdxs.map(i => q.options[i]);
        const corr = [];
        shuffledIdxs.forEach((orig, newIdx) => { if (q.correct.includes(orig)) corr.push(newIdx); });
        return { ...q, options: opts, correct: corr.sort((a,b)=>a-b) };
      });
    }

    function getStats() {
      let correct = 0, incorrect = 0;
      for (let q of currentQuestions) {
        if (!questionLocked.get(q.id)) continue;
        const sel = userAnswers.get(q.id) || new Set();
        const corr = new Set(q.correct);
        if (sel.size === corr.size && [...sel].every(v => corr.has(v))) correct++; else incorrect++;
      }
      const total = currentQuestions.length, answered = correct + incorrect;
      return { correct, incorrect, pending: total - answered, answered, total };
    }

    function updateStats() {
      const s = getStats();
      correctEl.textContent = s.correct;
      incorrectEl.textContent = s.incorrect;
      pendingEl.textContent = s.pending;
      progressEl.textContent = `Вопросов: ${s.answered} / ${s.total}`;
      scoreEl.textContent = `✓ ${s.correct}`;
    }

    function lockQuestion(qId) {
      const question = currentQuestions.find(q => q.id === qId);
      if (!question) return;
      const sel = userAnswers.get(qId) || new Set();
      const block = document.querySelector(`.question-block[data-question-id="${qId}"]`);
      if (!block) return;
      block.querySelectorAll('.option-item').forEach((item, idx) => {
        item.style.pointerEvents = 'none';
        const isCorr = question.correct.includes(idx), isSel = sel.has(idx);
        item.classList.remove('selected-correct','selected-incorrect','reveal-correct','user-selected');
        if (isSel && isCorr) item.classList.add('selected-correct');
        else if (isSel && !isCorr) item.classList.add('selected-incorrect');
        else if (!isSel && isCorr) item.classList.add('reveal-correct');
      });
      const btn = block.querySelector('.confirm-btn'); if (btn) btn.remove();
      questionLocked.set(qId, true);
      updateStats();
    }

    function handleOptionClick(qId, optIdx) {
      if (questionLocked.get(qId)) return;
      const q = currentQuestions.find(q => q.id === qId);
      if (!q) return;
      if (!userAnswers.has(qId)) userAnswers.set(qId, new Set());
      const sel = userAnswers.get(qId);
      sel.clear(); sel.add(optIdx); userAnswers.set(qId, sel);
      lockQuestion(qId);
      updateStats();
    }

    function renderQuestions() {
      container.innerHTML = '';
      userAnswers.clear(); questionLocked.clear();
      currentQuestions.forEach(q => {
        const block = document.createElement('div');
        block.className = 'question-block';
        block.setAttribute('data-question-id', q.id);
        const qt = document.createElement('div');
        qt.className = 'question-text'; qt.textContent = q.text;
        block.appendChild(qt);
        const opts = document.createElement('div');
        opts.className = 'options';
        q.options.forEach((optText, idx) => {
          const oi = document.createElement('div');
          oi.className = 'option-item'; oi.setAttribute('data-option-index', idx);
          const mk = document.createElement('span');
          mk.className = 'option-marker'; mk.textContent = String.fromCharCode(65+idx)+'.';
          const ts = document.createElement('span');
          ts.className = 'option-text'; ts.textContent = optText;
          oi.appendChild(mk); oi.appendChild(ts);
          oi.addEventListener('click', (e) => { e.stopPropagation(); handleOptionClick(q.id, idx); });
          opts.appendChild(oi);
        });
        block.appendChild(opts);
        container.appendChild(block);
      });
      updateStats();
    }

    function restart() { currentQuestions = buildQuestions(); renderQuestions(); }
    currentQuestions = buildQuestions();
    renderQuestions();
    restartBtn.addEventListener('click', restart);
  }

    function getStats() {

    function lockQuestion(qId) {
      const question = currentQuestions.find(q => q.id === qId);
      if (!question) return;
      const sel = userAnswers.get(qId) || new Set();
      const block = document.querySelector(`#defQuestionsContainer .question-block[data-question-id="${qId}"]`);
      if (!block) return;
      block.querySelectorAll('.option-item').forEach((item, idx) => {
        item.style.pointerEvents = 'none';
        const isCorr = question.correct.includes(idx), isSel = sel.has(idx);
        item.classList.remove('selected-correct','selected-incorrect','reveal-correct','user-selected');
        if (isSel && isCorr) item.classList.add('selected-correct');
        else if (isSel && !isCorr) item.classList.add('selected-incorrect');
        else if (!isSel && isCorr) item.classList.add('reveal-correct');
      });
      const btn = block.querySelector('.confirm-btn'); if (btn) btn.remove();

  function renderGostLearn() {
    const shuffled = shuffleArray([...GOST_ENTRIES]);
    dynamicContent.innerHTML = `

      </div>`;

  function initLearn(cards, type) {
    let currentIndex = 0;
    const container = document.getElementById('flashcardContainer');
    const counter = document.getElementById('cardCounter');
    const prevBtn = document.getElementById('prevCard');
    const nextBtn = document.getElementById('nextCard');
    const shuffleBtn = document.getElementById('shuffleCards');

    function renderCard() {
      const card = cards[currentIndex];
      const frontText = type === 'gost' ? card.code : card.term;
      const backText = type === 'gost' ? card.name : card.def;
      container.innerHTML = `
        <div class="flashcard" id="currentFlashcard" onclick="this.classList.toggle('flipped')">
          <div class="flashcard-inner">
            <div class="flashcard-front">
              <div class="flashcard-term">${frontText}</div>
              <div class="flashcard-hint">Нажмите, чтобы увидеть ответ</div>
            </div>
            <div class="flashcard-back">
              <div class="flashcard-def">${backText}</div>
              <div class="flashcard-hint">Нажмите, чтобы вернуться</div>
            </div>
          </div>
        </div>`;
      counter.textContent = `${currentIndex + 1} / ${cards.length}`;
    }

    function goToPrev() {
      const flashcard = document.getElementById('currentFlashcard');
      if (flashcard) flashcard.classList.remove('flipped');
      currentIndex = (currentIndex - 1 + cards.length) % cards.length;
      renderCard();
    }

    function goToNext() {
      const flashcard = document.getElementById('currentFlashcard');
      if (flashcard) flashcard.classList.remove('flipped');
      currentIndex = (currentIndex + 1) % cards.length;
      renderCard();
    }

    function shuffleAndReset() {
      shuffleArray(cards);
      currentIndex = 0;
      renderCard();
    }

    prevBtn.addEventListener('click', goToPrev);
    nextBtn.addEventListener('click', goToNext);
    shuffleBtn.addEventListener('click', shuffleAndReset);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goToPrev();
      if (e.key === 'ArrowRight') goToNext();
      if (e.key === ' ') { e.preventDefault(); const fc = document.getElementById('currentFlashcard'); if (fc) fc.classList.toggle('flipped'); }
    });
    renderCard();
  }

  function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

  renderHome();
